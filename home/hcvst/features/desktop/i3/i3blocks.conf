command=$SCRIPT_DIR/$BLOCK_NAME/$BLOCK_NAME
separator_block_width=15
markup=none

[volume]
label=♪
interval=once
signal=10

[memory]
label=MEM
interval=30

[memory]
label=SWAP
instance=swap
separator=false
interval=30

[disk]
label=HOME
interval=30

[iface]
interval=10

[bandwidth]
interval=5

[cpu_usage]
label=CPU
interval=10
min_width=CPU 100.00%

[load_average]
label=LOAD
interval=10

[time]
command=date '+%Y-%m-%d %H:%M:%S'
interval=5